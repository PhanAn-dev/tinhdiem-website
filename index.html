<!DOCTYPE html>
<html lang="vi" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Công cụ Tính điểm & Dự đoán điểm thi DTU</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dtuMoc: '#7a7570',
                        dtuXanh: '#6b8c6e',
                        dtuDo: '#b85c3a',
                        dtuVangNhat: '#e8d5a3',
                        dtuVangDam: '#c9a84c'
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        *, *::before, *::after {
            transition-property: background-color, border-color, color, fill, stroke;
            transition-duration: 300ms;
        }
    </style>
</head>
<body class="bg-slate-50 text-[#7a7570] dark:bg-[#0b1329] dark:text-slate-300 min-h-screen flex flex-col justify-between pb-12">

    <header class="w-full py-4 px-6 bg-white border-b border-[#7a7570]/30 dark:bg-[#151c26] dark:border-[#7a7570]/20 flex items-center justify-between shadow-sm">
        <div class="flex items-center space-x-3">
            <i class="fa-solid fa-book-open text-[#6b8c6e] text-xl"></i>
            <span class="font-bold text-lg tracking-wide text-slate-900 dark:text-white">Công cụ Tính điểm</span>
        </div>
        <div class="flex items-center space-x-4">
            <button id="theme-toggle" class="bg-slate-100 border border-[#7a7570]/40 text-[#7a7570] hover:text-[#6b8c6e] dark:bg-slate-800/50 dark:border-[#7a7570]/30 dark:text-slate-400 dark:hover:text-[#e8d5a3] p-2 rounded-lg cursor-pointer transition-colors" title="Thay đổi giao diện Sáng/Tối">
                <i id="theme-toggle-dark-icon" class="fa-solid fa-moon hidden"></i>
                <i id="theme-toggle-light-icon" class="fa-solid fa-sun hidden"></i>
            </button>
            <div class="bg-slate-100 border border-[#7a7570]/30 text-slate-700 dark:bg-slate-800/50 dark:border-[#7a7570]/30 dark:text-slate-400 text-xs px-3 py-1.5 rounded-full">
                <span class="font-semibold text-slate-700 dark:text-slate-300">Phan An</span>
            </div>
        </div>
    </header>

    <main class="flex-grow container mx-auto max-w-4xl px-4 py-6">
        <div class="bg-white border border-[#7a7570]/20 dark:bg-[#151c26] dark:border-[#7a7570]/20 rounded-2xl p-6 md:p-8 shadow-2xl relative overflow-hidden">
            
            <div class="absolute -top-24 -left-24 w-48 h-48 bg-[#6b8c6e]/10 blur-3xl rounded-full pointer-events-none"></div>
            <div class="absolute -bottom-24 -right-24 w-48 h-48 bg-[#e8d5a3]/10 blur-3xl rounded-full pointer-events-none"></div>

            <div class="text-center mb-8 relative z-10">
                <h1 class="text-2xl md:text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-[#6b8c6e] via-[#c9a84c] to-[#b85c3a] mb-3">
                    Công cụ tính điểm & dự đoán điểm thi
                </h1>
                <p class="text-[#7a7570] dark:text-slate-400 text-sm md:text-base max-w-xl mx-auto">
                    Nhập điểm thành phần để tính kết quả học tập hoặc dự đoán điểm thi cuối kỳ.
                </p>
            </div>

            <div class="hidden md:grid grid-cols-12 gap-4 pb-3 mb-2 border-b border-[#7a7570]/30 dark:border-[#7a7570]/20 text-xs font-semibold uppercase tracking-wider text-[#7a7570] dark:text-slate-400 px-2">
                <div class="col-span-5">Tên Cột Điểm</div>
                <div class="col-span-2 text-center">Trọng số (%)</div>
                <div class="col-span-3 text-center">Điểm (0-10)</div>
                <div class="col-span-1 text-center">Cuối kỳ?</div>
                <div class="col-span-1 text-center">Xóa</div>
            </div>

            <div id="gradeRowsContainer" class="space-y-3 mb-4">
            </div>

            <div class="flex flex-col sm:flex-row justify-between items-center pt-4 border-t border-[#7a7570]/30 dark:border-[#7a7570]/20 gap-4">
                <div class="text-sm font-medium text-slate-700 dark:text-slate-300">
                    Tổng trọng số hiện tại: <span id="totalWeightDisplay" class="font-bold text-[#6b8c6e]">0%</span>
                </div>
                <button onclick="addNewRow()" class="w-full sm:w-auto flex items-center justify-center space-x-2 border-2 border-dashed border-[#7a7570]/40 hover:border-[#6b8c6e] text-[#7a7570] hover:text-[#6b8c6e] dark:border-[#7a7570]/30 dark:hover:border-[#e8d5a3] dark:text-slate-300 dark:hover:text-[#e8d5a3] rounded-xl px-5 py-2.5 text-sm cursor-pointer transition-all duration-200 bg-transparent">
                    <i class="fa-solid fa-plus text-xs"></i>
                    <span>Thêm Cột Điểm</span>
                </button>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-8">
                <button onclick="handlePrediction()" class="w-full border border-[#c9a84c]/60 hover:border-[#c9a84c] text-[#c9a84c] hover:bg-[#c9a84c]/5 font-semibold py-3 px-6 rounded-xl transition-all duration-200 cursor-pointer text-center bg-transparent">
                    Dự tính điểm thi
                </button>
                <button onclick="handleCalculation()" class="w-full bg-gradient-to-r from-[#6b8c6e] to-[#c9a84c] hover:opacity-90 text-white font-semibold py-3 px-6 rounded-xl shadow-lg shadow-[#6b8c6e]/20 transition-all duration-200 cursor-pointer text-center">
                    Tính kết quả
                </button>
            </div>

            <div id="resultBox" class="hidden mt-8 transition-all duration-300">
            </div>

        </div>
    </main>

    <footer class="text-center text-xs text-[#7a7570]/70 dark:text-slate-500 w-full mt-auto pt-4">
        &copy; 2026 - <span class="font-bold text-[#7a7570] dark:text-slate-300">Phan An.</span>
    </footer>

    <script>
        const themeToggleBtn = document.getElementById('theme-toggle');
        const darkIcon = document.getElementById('theme-toggle-dark-icon');
        const lightIcon = document.getElementById('theme-toggle-light-icon');

        function updateIcons() {
            if (document.documentElement.classList.contains('dark')) {
                darkIcon.classList.add('hidden');
                lightIcon.classList.remove('hidden');
            } else {
                lightIcon.classList.add('hidden');
                darkIcon.classList.remove('hidden');
            }
        }

        if (localStorage.getItem('color-theme') === 'light') {
            document.documentElement.classList.remove('dark');
        } else {
            document.documentElement.classList.add('dark');
        }
        updateIcons();

        themeToggleBtn.addEventListener('click', function() {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('color-theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('color-theme', 'dark');
            }
            updateIcons();
        });

        let gradeRows = [
            { id: 1, name: "Bài Tập Về Nhà", weight: 5, score: "", isFinal: false },
            { id: 2, name: "Chuyên Cần", weight: 5, score: "", isFinal: false },
            { id: 3, name: "Phát Biểu & Thảo Luận", weight: 5, score: "", isFinal: false },
            { id: 4, name: "Kiểm Tra Giữa Kỳ", weight: 15, score: "", isFinal: false },
            { id: 5, name: "Thực Hành & Thực Tế", weight: 15, score: "", isFinal: false },
            { id: 6, name: "Kiểm Tra Cuối Kỳ", weight: 55, score: "", isFinal: true }
        ];

        function syncDOMToState() {
            gradeRows.forEach(row => {
                const nameEl = document.getElementById(`name-${row.id}`);
                const weightEl = document.getElementById(`weight-${row.id}`);
                const scoreEl = document.getElementById(`score-${row.id}`);
                const isFinalEl = document.getElementById(`final-${row.id}`);

                if (nameEl) row.name = nameEl.value;
                if (weightEl) row.weight = parseFloat(weightEl.value) || 0;
                
                if (scoreEl) {
                    if (scoreEl.value === "") {
                        row.score = "";
                    } else {
                        let val = parseFloat(scoreEl.value);
                        if (val > 10) { val = 10; scoreEl.value = 10; }
                        if (val < 0) { val = 0; scoreEl.value = 0; }
                        row.score = val;
                    }
                }
                if (isFinalEl) row.isFinal = isFinalEl.checked;
            });
        }

        function handleFinalCheckboxToggle(selectedId) {
            syncDOMToState();
            gradeRows.forEach(row => {
                row.isFinal = (row.id === selectedId);
            });
            renderRows();
        }

        function renderRows() {
            const container = document.getElementById('gradeRowsContainer');
            container.innerHTML = '';

            gradeRows.forEach((row) => {
                const rowHtml = `
                    <div class="grid grid-cols-1 md:grid-cols-12 gap-3 md:gap-4 items-center p-3 md:p-2 bg-slate-100 dark:bg-slate-800/20 md:bg-transparent dark:md:bg-transparent rounded-xl border border-[#7a7570]/20 dark:border-[#7a7570]/10 md:border-none">
                        <div class="col-span-12 md:col-span-5">
                            <label class="block md:hidden text-xs text-[#7a7570] dark:text-slate-400 mb-1 font-semibold">Tên Cột Điểm</label>
                            <input type="text" id="name-${row.id}" value="${row.name}" class="w-full bg-white text-slate-800 border border-[#7a7570]/30 dark:bg-[#1b2330] dark:border-[#7a7570]/30 dark:text-white rounded-lg px-3 py-2 text-sm focus:border-[#6b8c6e] focus:outline-none focus:ring-2 focus:ring-[#6b8c6e]/20" placeholder="Tên cột điểm...">
                        </div>
                        <div class="col-span-6 md:col-span-2">
                            <label class="block md:hidden text-xs text-[#7a7570] dark:text-slate-400 mb-1 font-semibold">Trọng số (%)</label>
                            <input type="number" id="weight-${row.id}" value="${row.weight}" oninput="updateTotalWeightDisplay()" class="w-full bg-white text-slate-800 border border-[#7a7570]/30 dark:bg-[#1b2330] dark:border-[#7a7570]/30 dark:text-white rounded-lg px-3 py-2 text-sm text-center focus:border-[#6b8c6e] focus:outline-none focus:ring-2 focus:ring-[#6b8c6e]/20" placeholder="%">
                        </div>
                        <div class="col-span-6 md:col-span-3">
                            <label class="block md:hidden text-xs text-[#7a7570] dark:text-slate-400 mb-1 font-semibold">Điểm (0-10)</label>
                            <input type="number" step="0.01" min="0" max="10" id="score-${row.id}" value="${row.score !== "" ? row.score : ""}" class="w-full bg-white text-slate-800 border border-[#7a7570]/30 dark:bg-[#1b2330] dark:border-[#7a7570]/30 dark:text-white rounded-lg px-3 py-2 text-sm text-center focus:border-[#6b8c6e] focus:outline-none focus:ring-2 focus:ring-[#6b8c6e]/20" placeholder="Nhập điểm">
                        </div>
                        <div class="col-span-6 md:col-span-1 flex flex-row md:justify-center items-center space-x-2 md:space-x-0 mt-2 md:mt-0">
                            <span class="block md:hidden text-xs text-[#7a7570] dark:text-slate-400 font-semibold">Cuối kỳ?</span>
                            <input type="checkbox" id="final-${row.id}" ${row.isFinal ? 'checked' : ''} onchange="handleFinalCheckboxToggle(${row.id})" class="w-4 h-4 rounded border-[#7a7570]/40 text-[#6b8c6e] focus:ring-[#6b8c6e] cursor-pointer">
                        </div>
                        <div class="col-span-6 md:col-span-1 flex flex-row md:justify-center items-center space-x-2 md:space-x-0 justify-end mt-2 md:mt-0">
                            <button onclick="removeRow(${row.id})" class="text-[#7a7570]/60 hover:text-[#b85c3a] dark:text-slate-500 dark:hover:text-[#b85c3a] p-1 transition-colors cursor-pointer" title="Xóa hàng">
                                <i class="fa-solid fa-xmark text-base"></i>
                            </button>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', rowHtml);
            });

            updateTotalWeightDisplay();
        }

        function updateTotalWeightDisplay() {
            let total = 0;
            gradeRows.forEach(row => {
                const el = document.getElementById(`weight-${row.id}`);
                if (el) {
                    total += parseFloat(el.value) || 0;
                } else {
                    total += row.weight;
                }
            });

            const display = document.getElementById('totalWeightDisplay');
            if (display) {
                display.innerText = `${total}%`;
                if (total === 100) {
                    display.className = "font-bold text-[#6b8c6e]";
                } else {
                    display.className = "font-bold text-[#b85c3a]";
                }
            }
            return total;
        }

        function addNewRow() {
            syncDOMToState();
            const newId = gradeRows.length > 0 ? Math.max(...gradeRows.map(r => r.id)) + 1 : 1;
            gradeRows.push({
                id: newId,
                name: "Cột Điểm Mới",
                weight: 0,
                score: "",
                isFinal: false
            });
            renderRows();
        }

        function removeRow(id) {
            syncDOMToState();
            gradeRows = gradeRows.filter(row => row.id !== id);
            renderRows();
        }

        function getGradeDetails(finalTotal, finalExamScore) {
            let failed = (finalExamScore !== null && finalExamScore < 1.0) || finalTotal < 4.0;
            
            if (failed) {
                return {
                    grade: 'F',
                    gpa: '0.00',
                    status: 'Nợ môn ❌',
                    badgeBg: 'bg-[#b85c3a]/10 text-[#b85c3a] border border-[#b85c3a]/30 dark:bg-[#b85c3a]/20',
                    label: 'Kém',
                    warnText: 'Cảnh báo: Học phần này của bạn bị nợ môn.'
                };
            }

            if (finalTotal >= 9.5) {
                return { grade: 'A+', gpa: '4.00', label: 'Xuất sắc', status: 'Qua môn 🎉', badgeBg: 'bg-[#6b8c6e]/10 text-[#6b8c6e] border border-[#6b8c6e]/30 dark:bg-[#6b8c6e]/20' };
            } else if (finalTotal >= 8.5) {
                return { grade: 'A', gpa: '4.00', label: 'Giỏi', status: 'Qua môn 🎉', badgeBg: 'bg-[#6b8c6e]/10 text-[#6b8c6e] border border-[#6b8c6e]/30 dark:bg-[#6b8c6e]/20' };
            } else if (finalTotal >= 8.0) {
                return { grade: 'A-', gpa: '3.65', label: 'Giỏi', status: 'Qua môn 🎉', badgeBg: 'bg-[#6b8c6e]/10 text-[#6b8c6e] border border-[#6b8c6e]/30 dark:bg-[#6b8c6e]/20' };
            } else if (finalTotal >= 7.5) {
                return { grade: 'B+', gpa: '3.33', label: 'Khá', status: 'Qua môn 🎉', badgeBg: 'bg-[#c9a84c]/10 text-[#c9a84c] border border-[#c9a84c]/30 dark:bg-[#c9a84c]/20' };
            } else if (finalTotal >= 7.0) {
                return { grade: 'B', gpa: '3.00', label: 'Khá', status: 'Qua môn 🎉', badgeBg: 'bg-[#c9a84c]/10 text-[#c9a84c] border border-[#c9a84c]/30 dark:bg-[#c9a84c]/20' };
            } else if (finalTotal >= 6.5) {
                return { grade: 'B-', gpa: '2.65', label: 'Khá', status: 'Qua môn 🎉', badgeBg: 'bg-[#c9a84c]/10 text-[#c9a84c] border border-[#c9a84c]/30 dark:bg-[#c9a84c]/20' };
            } else if (finalTotal >= 6.0) {
                return { grade: 'C+', gpa: '2.33', label: 'Trung bình', status: 'Qua môn 🎉', badgeBg: 'bg-[#7a7570]/10 text-[#7a7570] border border-[#7a7570]/30 dark:text-slate-300' };
            } else if (finalTotal >= 5.5) {
                return { grade: 'C', gpa: '2.00', label: 'Trung bình', status: 'Qua môn 🎉', badgeBg: 'bg-[#7a7570]/10 text-[#7a7570] border border-[#7a7570]/30 dark:text-slate-300' };
            } else if (finalTotal >= 4.5) {
                return { grade: 'C-', gpa: '1.65', label: 'Trung bình yếu', status: 'Qua môn 🎉', badgeBg: 'bg-[#b85c3a]/10 text-[#b85c3a] border border-[#b85c3a]/30' };
            } else {
                return { grade: 'D', gpa: '1.00', label: 'Yếu', status: 'Qua môn 🎉', badgeBg: 'bg-[#b85c3a]/10 text-[#b85c3a] border border-[#b85c3a]/30' };
            }
        }

        function handleCalculation() {
            syncDOMToState();
            const totalWeight = updateTotalWeightDisplay();
            const resultBox = document.getElementById('resultBox');

            if (totalWeight > 100) {
                alert(`Tổng trọng số đang là ${totalWeight}%. Không được vượt quá 100%.`);
                return;
            }

            let weightedSum = 0;
            let missingScores = false;
            let finalExamScore = null;
            let totalWInputed = 0;

            gradeRows.forEach(row => {
                if (row.weight > 0) {
                    if (row.score === "") {
                        missingScores = true;
                    } else {
                        weightedSum += (row.score * (row.weight / 100));
                        totalWInputed += row.weight;
                        if (row.isFinal) finalExamScore = row.score;
                    }
                }
            });

            if (missingScores || totalWInputed < 100) {
                alert("Vui lòng nhập đầy đủ tất cả điểm số và đảm bảo tổng trọng số đạt chính xác 100% để tính điểm.");
                return;
            }

            const finalTotal = Math.round(weightedSum * 100) / 100;
            const evalResult = getGradeDetails(finalTotal, finalExamScore);

            resultBox.className = "mt-8 block";
            resultBox.innerHTML = `
                <div class="text-center mb-4">
                    <h3 class="text-xl font-bold text-slate-800 dark:text-white tracking-wide">Kết quả Học tập</h3>
                </div>
                <div class="bg-white border border-[#7a7570]/30 dark:bg-[#1b2330] dark:border-[#7a7570]/20 rounded-xl p-5 max-w-xl mx-auto space-y-4 shadow-xl">
                    <div class="flex justify-between items-center text-sm py-1 border-b border-[#7a7570]/10">
                        <span class="text-[#7a7570] dark:text-slate-400">Tổng trọng số:</span>
                        <span class="font-medium text-slate-800 dark:text-white">100%</span>
                    </div>
                    <div class="flex justify-between items-center text-sm py-1 border-b border-[#7a7570]/10">
                        <span class="text-[#7a7570] dark:text-slate-400">Điểm tổng kết (hệ 10):</span>
                        <span class="font-bold text-[#6b8c6e] text-lg">${finalTotal.toFixed(2)}</span>
                    </div>
                    <div class="flex justify-between items-center text-sm py-1 border-b border-[#7a7570]/10">
                        <span class="text-[#7a7570] dark:text-slate-400">Điểm hệ 4:</span>
                        <span class="font-semibold text-slate-800 dark:text-white">${evalResult.gpa}</span>
                    </div>
                    <div class="flex justify-between items-center text-sm py-1 border-b border-[#7a7570]/10">
                        <span class="text-[#7a7570] dark:text-slate-400">Điểm chữ:</span>
                        <span class="font-bold text-slate-800 dark:text-white text-base">${evalResult.grade}</span>
                    </div>
                    <div class="flex justify-between items-center text-sm py-1 border-b border-[#7a7570]/10">
                        <span class="text-[#7a7570] dark:text-slate-400">Xếp loại:</span>
                        <span class="font-semibold text-slate-800 dark:text-white">${evalResult.label}</span>
                    </div>
                    <div class="flex justify-between items-center text-sm pt-1">
                        <span class="text-[#7a7570] dark:text-slate-400">Trạng thái:</span>
                        <span class="px-4 py-1 rounded-full text-xs font-bold ${evalResult.badgeBg}">${evalResult.status}</span>
                    </div>
                </div>
                ${evalResult.warnText ? `<div class="text-center text-xs text-[#b85c3a] font-semibold mt-4 tracking-wide">${evalResult.warnText}</div>` : ''}
            `;
        }

        function handlePrediction() {
            syncDOMToState();
            const totalWeight = updateTotalWeightDisplay();
            const resultBox = document.getElementById('resultBox');

            if (totalWeight !== 100) {
                alert(`Tổng trọng số hiện tại là ${totalWeight}%. Vui lòng điều chỉnh về bằng đúng 100% để dự đoán.`);
                return;
            }

            const finalRow = gradeRows.find(row => row.isFinal);
            if (!finalRow || finalRow.weight <= 0) {
                alert("Vui lòng chọn dấu tick ở ô 'Cuối kỳ?' để bot biết cần tính toán mục tiêu cho cột nào!");
                return;
            }

            let nonFinalWeightedSum = 0;
            let partialMissing = false;

            gradeRows.forEach(row => {
                if (!row.isFinal && row.weight > 0) {
                    if (row.score === "") partialMissing = true;
                    nonFinalWeightedSum += (row.score * (row.weight / 100));
                }
            });

            if (partialMissing) {
                alert("Vui lòng nhập đầy đủ điểm các cột thành phần hiện tại. Chỉ để trống duy nhất cột điểm thi Cuối Kỳ.");
                return;
            }

            const finalWeightFactor = finalRow.weight / 100;

            function calculateScoreNeeded(targetTotal) {
                let needed = (targetTotal - nonFinalWeightedSum) / finalWeightFactor;
                needed = Math.ceil(needed * 100) / 100;
                return needed;
            }

            let scoreForD = calculateScoreNeeded(4.0);
            if (scoreForD < 1.0) scoreForD = 1.0;

            const scoreForC = calculateScoreNeeded(5.5);
            const scoreForB = calculateScoreNeeded(7.0);
            const scoreForA = calculateScoreNeeded(8.5);
            const scoreForAPlus = calculateScoreNeeded(9.5);

            function displayFormatNew(score, colorClass) {
                if (score > 10) return `<span class="text-[#7a7570] font-medium">Không thể đạt</span>`;
                if (score <= 1.0) return `<span class="text-[#6b8c6e] font-bold">&ge; 1.00 điểm</span>`;
                return `<span class="${colorClass} font-bold">${score.toFixed(2)} điểm</span>`;
            }

            resultBox.className = "mt-8 block";
            resultBox.innerHTML = `

                        <div class="flex justify-between items-center text-sm pb-2 border-b border-[#7a7570]/10">

                        <div class="flex justify-between items-center text-sm pb-2 border-b border-[#7a7570]/10">

                        </div>
                    </div>
                </div>
            `;

        window.onload = function() {

    </script>
